<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baixa de Insumo | Merenda Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root {
      --primary: #059669; --primary-dark: #047857;
      --bg-base: #ffffff; --bg-surface: #f8fafc;
      --text-main: #0f172a; --text-muted: #64748b;
      --glass-border: rgba(0, 0, 0, 0.1);
      --glass-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --neon-glow: 0 4px 12px rgba(5, 150, 105, 0.2);
      --alert-red: #ef4444; --alert-red-glow: 0 4px 12px rgba(239, 68, 68, 0.3);
      --alert-yellow: #f59e0b;
      --input-bg: rgba(0, 0, 0, 0.05);
      --card-bg: #ffffff;
    }
    [data-theme="dark"] {
      --primary: #00f260; --primary-dark: #0575e6;
      --bg-base: #030712; --bg-surface: rgba(17, 24, 39, 0.7);
      --text-main: #f9fafb; --text-muted: #9ca3af;
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --neon-glow: 0 0 20px rgba(0, 242, 96, 0.4);
      --alert-red: #ef4444; --alert-red-glow: 0 0 20px rgba(239, 68, 68, 0.4);
      --alert-yellow: #facc15;
      --input-bg: rgba(0, 0, 0, 0.5);
      --card-bg: rgba(255, 255, 255, 0.03);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Outfit", sans-serif; background: var(--bg-base); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
    
    /* Background Grid */
    .bg-grid {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2;
      background-image: 
        linear-gradient(var(--glass-border) 1px, transparent 1px),
        linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .bg-glow {
      position: fixed; top: -20%; right: -10%; width: 60vw; height: 60vw; border-radius: 50%;
      background: radial-gradient(circle, rgba(5, 117, 230, 0.1) 0%, transparent 60%); z-index: -1;
    }

    /* Mobile / Tablet App Structure */
    .app-header {
      background: var(--bg-surface); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--glass-border); padding: 15px 24px;
      display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;
      box-shadow: var(--glass-shadow);
    }
    .back-btn { display: flex; align-items: center; gap: 8px; color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 1.1rem; }
    .back-btn i { color: var(--primary); }

    .main-content {
      flex: 1; padding: 30px 24px 100px; max-width: 600px; margin: 0 auto; width: 100%;
    }
    
    .page-title { text-align: center; margin-bottom: 30px; }
    .page-title h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
    .page-title p { color: var(--text-muted); font-size: 1rem; }

    /* Scanner UI */
    .scanner-box {
      background: var(--bg-surface); border: 2px dashed var(--glass-border); border-radius: 24px;
      padding: 40px 20px; display: flex; flex-direction: column; align-items: center; text-align: center;
      margin-bottom: 30px; backdrop-filter: blur(20px); transition: 0.3s;
    }
    .scanner-box:hover { border-color: var(--primary); background: rgba(0, 242, 96, 0.05); }
    .scanner-icon {
      width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, rgba(0, 242, 96, 0.1), rgba(5, 117, 230, 0.1));
      color: var(--primary); font-size: 2rem; display: flex; align-items: center; justify-content: center; margin-bottom: 15px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 242, 96, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 242, 96, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 242, 96, 0); } }

    /* Form Elements */
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select {
      width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--glass-border);
      font-size: 1rem; font-family: inherit; color: var(--text-main); background: var(--input-bg);
      outline: none; transition: 0.2s; appearance: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--primary); box-shadow: var(--neon-glow); }

    .quantity-selector { display: flex; align-items: center; gap: 15px; }
    .qty-btn { width: 50px; height: 50px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--bg-surface); color: var(--text-main); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
    .qty-btn:hover { background: var(--input-bg); border-color: var(--primary); color: var(--primary); }
    .quantity-selector input { text-align: center; font-weight: 800; font-size: 1.2rem; }

    .btn-submit {
      width: 100%; padding: 18px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: var(--bg-base);
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: 0.3s; margin-top: 30px; box-shadow: var(--neon-glow);
    }
    .btn-submit:hover { transform: translateY(-3px); }

    /* Expected Menu Card */
    .menu-card {
      background: rgba(5, 150, 105, 0.1); border: 1px solid rgba(5, 150, 105, 0.3); border-radius: 16px;
      padding: 16px; display: flex; align-items: center; gap: 15px; margin-bottom: 24px;
    }
    .menu-icon { font-size: 1.8rem; color: var(--primary); }
    .menu-details h4 { font-size: 1rem; margin-bottom: 4px; color: var(--text-main); }
    .menu-details p { font-size: 0.85rem; color: var(--text-muted); }

  </style>
  <script>
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <header class="app-header">
    <a href="operador.html" class="back-btn">
      <i class="fa-solid fa-chevron-left"></i> Voltar
    </a>
    <span style="font-weight: 700; color: var(--text-muted);">Estoque</span>
  </header>

  <main class="main-content">
    <div class="page-title">
      <h1>Baixa de Insumo</h1>
      <p>Retire do estoque os produtos para preparar o cardápio do dia.</p>
    </div>

    <div class="menu-card">
      <div class="menu-icon"><i class="fa-solid fa-bowl-rice"></i></div>
      <div class="menu-details">
        <h4>Cardápio do Dia: Arroz com Frango</h4>
        <p>Previsão Preditiva: Sistema sugere preparar 350 porções.</p>
      </div>
    </div>

    <div class="scanner-box" onclick="simularLeitura()">
      <div class="scanner-icon" id="scan-icon"><i class="fa-solid fa-barcode"></i></div>
      <h3 id="scan-title">Escanear Código de Barras</h3>
      <p id="scan-desc" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Aponte a câmera para o pacote ou lote do produto.</p>
    </div>

    <form onsubmit="registrarBaixa(event)">
      <div class="form-group">
        <label>Produto Identificado</label>
        <select id="produto" required>
          <option value="" disabled selected>Nenhum produto selecionado...</option>
          <option value="1">Arroz Parboilizado Tipo 1 (Saco 5kg)</option>
          <option value="2">Peito de Frango Congelado (Caixa 10kg)</option>
          <option value="3">Óleo de Soja (Pet 900ml)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Quantidade Retirada</label>
        <div class="quantity-selector">
          <button type="button" class="qty-btn" onclick="alterarQtd(-1)"><i class="fa-solid fa-minus"></i></button>
          <input type="number" id="qtd" value="1" min="1" required>
          <button type="button" class="qty-btn" onclick="alterarQtd(1)"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn" disabled style="opacity: 0.5; cursor: not-allowed;">
        <i class="fa-solid fa-check"></i> Confirmar Saída
      </button>
    </form>
  </main>

  <script>
    function alterarQtd(val) {
      const input = document.getElementById('qtd');
      let currentVal = parseInt(input.value) || 1;
      let newVal = currentVal + val;
      if (newVal < 1) newVal = 1;
      input.value = newVal;
    }

    function simularLeitura() {
      const icon = document.getElementById('scan-icon');
      const title = document.getElementById('scan-title');
      const desc = document.getElementById('scan-desc');
      const select = document.getElementById('produto');
      const btn = document.getElementById('submit-btn');

      icon.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      title.innerText = 'Lendo Código...';
      
      setTimeout(() => {
        icon.innerHTML = '<i class="fa-solid fa-check"></i>';
        icon.style.color = '#fff';
        icon.style.background = 'var(--primary)';
        icon.style.animation = 'none';
        
        title.innerText = 'Lote Reconhecido!';
        title.style.color = 'var(--primary)';
        desc.innerText = 'Lote #4992 (Trava FIFO Validada)';
        
        select.value = '1';
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.style.cursor = 'pointer';
      }, 1500);
    }

    function registrarBaixa(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Registrando no Blockchain...';
      btn.style.pointerEvents = 'none';

      setTimeout(() => {
        btn.innerHTML = '<i class="fa-solid fa-check-double"></i> Saída Registrada!';
        btn.style.background = '#10b981';
        
        setTimeout(() => {
          window.location.href = 'operador.html';
        }, 1500);
      }, 1500);
    }
  </script>
</body>
</html>
