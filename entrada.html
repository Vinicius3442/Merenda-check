<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recepção de Lote | Merenda Check</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/global.css" />

  <style>
    .header-dash { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 20px;}
    .header-dash h1 { font-size: 2.2rem; margin-bottom: 8px; }

    .wizard-container { max-width: 900px; margin: 0 auto; }
    
    .scanner-mock {
      width: 100%; height: 300px; border-radius: 20px; border: 2px dashed var(--primary);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(5, 150, 105, 0.05); color: var(--primary); margin-bottom: 30px; position: relative;
      overflow: hidden; cursor: pointer;
    }
    
    .scanner-line {
      position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--primary);
      box-shadow: var(--neon-glow); animation: scan 2s linear infinite; display: none;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; opacity: 0.4; pointer-events: none; transition: 0.3s;}
    .info-grid.active { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>

  <div class="bg-mesh"></div>

  <div class="app-container">
    <main class="app-main" style="padding-top: 60px;">
      
      <div class="wizard-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
          <a href="operador.html" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
          <img src="assets/logo.png" alt="Merenda Check" class="logo-img" />
        </div>
        <div class="header-dash animate-fade-in">
          <div>
            <h1>Recepção Integrada de Insumos</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Escaneie o manifesto digital do motorista enviado pelo Sistema Central (SEDUC).</p>
          </div>
        </div>

        <div class="glass-panel animate-slide-up" style="padding: 40px;">
          
          <div class="scanner-mock" id="scannerMock">
            <div class="scanner-line"></div>
            <i class="fa-solid fa-qrcode" style="font-size: 4rem; margin-bottom: 16px;"></i>
            <h3 class="brand-font" style="font-size: 1.2rem;">Clique para simular Escaneamento Óptico</h3>
            <p style="font-size: 0.9rem; margin-top: 8px;">Simula liberação de câmera segura</p>
          </div>

          <div class="info-grid" id="dataGrid">
            <div class="form-group">
              <label class="form-label">Código de Rastreio (Lote)</label>
              <input type="text" class="form-control" id="fHash" readonly placeholder="Aguardando..." />
            </div>
            
            <div class="form-group">
              <label class="form-label">Identificação do Insumo</label>
              <input type="text" class="form-control" id="fItem" readonly placeholder="Aguardando..." />
            </div>

            <div class="form-group">
              <label class="form-label">Volume Declarado Central</label>
              <input type="text" class="form-control" id="fQtd" readonly placeholder="Aguardando..." />
            </div>

            <div class="form-group">
              <label class="form-label">Fornecedor Responsável</label>
              <input type="text" class="form-control" id="fForn" readonly placeholder="Aguardando..." />
            </div>
            
            <div class="form-group">
               <label class="form-label">Volume Efetivamente Recebido (kg)</label>
               <input type="number" class="form-control" placeholder="Aferir na balança local..." id="fReal" />
            </div>
          </div>
          
          <div style="margin-top: 40px; text-align: right;">
            <button class="btn btn-primary btn-lg" id="btnConfirmar" disabled data-action="mock-submit" data-redirect="operador.html" data-success-title="Registros Sincronizados" data-success-msg="Entrada adicionada ao protocolo da SEDUC e registrada no estoque local.">
              <i class="fa-solid fa-check"></i> Confirmar Recebimento
            </button>
          </div>
          
        </div>

      </div>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    document.getElementById('scannerMock').addEventListener('click', function() {
      if(this.dataset.scanned) return;
      
      const icon = this.querySelector('i');
      const text = this.querySelector('h3');
      const desc = this.querySelector('p');
      const line = this.querySelector('.scanner-line');
      
      icon.className = 'fa-solid fa-camera-viewfinder';
      text.innerText = "Sincronizando Óptica...";
      desc.innerText = "Conectando ao sistema central...";
      line.style.display = 'block';

      setTimeout(() => {
        this.dataset.scanned = 'true';
        this.style.borderColor = 'var(--alert-green)';
        this.style.background = 'transparent';
        line.style.display = 'none';
        
        icon.className = 'fa-solid fa-check-circle';
        icon.style.color = 'var(--alert-green)';
        text.innerText = "Código Verificado";
        desc.innerText = "Validação Bem-sucedida";

        // Fill data
        const grid = document.getElementById('dataGrid');
        grid.classList.add('active');
        
        document.getElementById('fHash').value = "0x8F9B2C-11Z";
        document.getElementById('fItem').value = "Filé de Frango Grelhado Premium";
        document.getElementById('fQtd').value = "100 kg";
        document.getElementById('fForn').value = "AgroSul Alimentos SA";
        
        document.getElementById('btnConfirmar').removeAttribute('disabled');
        
        App.showToast('Recepção Verificada', 'O sistema confirmou a existência deste lote em trânsito.', 'success');
      }, 2000);
    });
  </script>
</body>
</html>
