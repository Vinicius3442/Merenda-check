<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recepção de Lotes | Merenda Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    :root {
      --primary: #00f260; --primary-dark: #0575e6;
      --bg-base: #030712; --bg-surface: rgba(17, 24, 39, 0.7);
      --text-main: #f9fafb; --text-muted: #9ca3af;
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --neon-glow: 0 0 20px rgba(0, 242, 96, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Outfit', sans-serif; background-color: var(--bg-base); color: var(--text-main);
      user-select: none; padding-bottom: 120px; overflow-x: hidden;
    }

    .bg-video-wrapper {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2;
      background: radial-gradient(circle at bottom center, rgba(5, 117, 230, 0.08), transparent 40%);
    }

    .topbar {
      background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 20px 24px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100;
    }
    .btn-back {
      background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border);
      padding: 12px 20px; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; gap: 10px; text-decoration: none; transition: 0.3s;
    }
    .btn-back:hover { background: rgba(255,255,255,0.1); }
    .topbar h2 { font-size: 1.3rem; margin: 0; position: absolute; left: 50%; transform: translateX(-50%); font-weight: 700; letter-spacing: -0.5px;}

    .container { max-width: 650px; margin: 40px auto; padding: 0 24px; display: flex; flex-direction: column; gap: 30px; animation: slideUp 0.6s ease forwards; opacity: 0; transform: translateY(20px);}
    @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

    .card { background: var(--bg-surface); border-radius: 24px; padding: 32px; backdrop-filter: blur(20px); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); }
    .card-title { font-size: 1.2rem; color: #fff; margin-bottom: 24px; font-weight: 700; display: flex; justify-content: space-between; align-items: center;}

    .scan-area {
      border: 2px dashed rgba(0, 242, 96, 0.4); border-radius: 20px; padding: 40px 20px;
      text-align: center; background: rgba(0, 242, 96, 0.02); cursor: pointer; transition: 0.3s;
    }
    .scan-area:active { transform: scale(0.98); background: rgba(0, 242, 96, 0.05); }
    .scan-icon { font-size: 4rem; color: var(--primary); margin-bottom: 16px; filter: drop-shadow(0 0 10px rgba(0,242,96,0.3));}
    .scan-text { font-size: 1.2rem; font-weight: 600; color: #fff; margin-bottom: 8px;}
    .scan-subtext { font-size: 0.95rem; color: var(--text-muted); }

    .input-group { margin-bottom: 20px;}
    .input-group label { display: block; font-size: 0.95rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
    .input-ctrl { width: 100%; padding: 18px 20px; font-size: 1.1rem; border: 1px solid var(--glass-border); border-radius: 12px; background: rgba(255,255,255,0.02); color: #fff; font-family: inherit; transition: 0.3s;}
    .input-ctrl:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px rgba(0,242,96,0.1); background: rgba(0,242,96,0.02);}

    .bottom-bar {
      position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(3, 7, 18, 0.85); backdrop-filter: blur(20px);
      padding: 24px; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); border-top: 1px solid var(--glass-border); z-index: 100;
    }
    .btn-submit {
      width: 100%; max-width: 650px; margin: 0 auto; display: flex; padding: 20px; border-radius: 20px; font-size: 1.3rem;
      font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #000;
      border: none; cursor: pointer; align-items: center; justify-content: center; gap: 12px;
      box-shadow: var(--neon-glow); transition: 0.2s; letter-spacing: -0.5px;
    }
    .btn-submit:active { transform: scale(0.98); }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.4s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-content {
      background: #0f172a; padding: 50px 40px; border-radius: 32px; text-align: center; max-width: 450px; width: 90%;
      transform: translateY(40px) scale(0.95); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid var(--glass-border); box-shadow: 0 0 50px rgba(0,242,96,0.2);
    }
    .modal-overlay.show .modal-content { transform: translateY(0) scale(1); }
    
    .modal-icon {
      width: 100px; height: 100px; background: rgba(0, 242, 96, 0.1); color: var(--primary); border: 1px solid rgba(0,242,96,0.3);
      border-radius: 50%; font-size: 3rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; box-shadow: var(--neon-glow);
    }
  </style>
</head>
<body>
  <div class="bg-video-wrapper"></div>
  <header class="topbar">
    <a href="operador.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i> Voltar</a>
    <h2>Entrada e Hash Fiscal</h2>
    <div style="width: 100px;"></div>
  </header>

  <main class="container">
    <div class="card">
      <div class="scan-area" onclick="simularLeitura()">
        <div class="scan-icon"><i class="fa-solid fa-qrcode"></i></div>
        <div class="scan-text">Escanear Nota Fiscal (NFe)</div>
        <div class="scan-subtext">Use a câmera do tablet para entrada expressa</div>
      </div>
    </div>

    <div class="card" id="formManual">
      <div class="card-title">Inserção Manual de Lote</div>
      
      <div class="input-group">
        <label>Código do Produto (SKU)</label>
        <input type="text" class="input-ctrl" placeholder="Ex: 88470" />
      </div>

      <div class="input-group">
        <label>Identificação de Lote</label>
        <input type="text" class="input-ctrl" placeholder="Numeração Fornecedor" />
      </div>
      
      <div class="input-group">
        <label>Quantidade Recebida (kg/und)</label>
        <input type="number" class="input-ctrl" placeholder="0" />
      </div>

      <div class="input-group">
        <label>Validade Legal</label>
        <input type="date" class="input-ctrl" />
      </div>
    </div>
  </main>

  <div class="bottom-bar">
    <button class="btn-submit" onclick="confirmarEntrada()">
      <i class="fa-solid fa-truck-ramp-box"></i> Autenticar no Inventário Global
    </button>
  </div>

  <div class="modal-overlay" id="modalSucesso">
    <div class="modal-content">
      <div class="modal-icon"><i class="fa-solid fa-shield-check"></i></div>
      <h2 style="color: #fff; margin-bottom: 16px; font-weight: 800; font-size: 2rem; letter-spacing: -1px;">Insumos Autenticados</h2>
      <p style="color: var(--text-muted); margin-bottom: 32px; font-size: 1.1rem; line-height: 1.6;">O novo lote passará a integrar a malha FIFO e será regido pela Inteligência Artificial.</p>
      <button onclick="window.location.href='operador.html'" style="width: 100%; padding: 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 16px; font-weight: 700; color: #fff; font-size: 1.1rem; cursor: pointer; transition: 0.3s;">Voltar ao Dashboard</button>
    </div>
  </div>

  <script>
    const modal = document.getElementById('modalSucesso');
    
    function simularLeitura() {
      const area = document.querySelector('.scan-area');
      area.innerHTML = '<div class="scan-icon" style="color:#0575e6;"><i class="fa-solid fa-spinner fa-spin"></i></div><div class="scan-text">Processando Criptografia...</div>';
      setTimeout(() => {
        confirmarEntrada();
      }, 1500);
    }

    function confirmarEntrada() {
      modal.classList.add('show');
    }
  </script>
</body>
</html>
