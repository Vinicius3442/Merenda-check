<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estoque Local | Merenda Check</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root {
      --primary-green: #059669; --bg-body: #f3f4f6; --bg-card: #ffffff;
      --text-main: #1f2937; --border-light: #e5e7eb;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Poppins", sans-serif; background: var(--bg-body); display: flex; min-height: 100vh; }
    
    .sidebar { width: 280px; background: #fff; border-right: 1px solid var(--border-light); padding: 24px; position: sticky; top: 0; height: 100vh; }
    .menu-item { padding: 14px 16px; border-radius: 12px; color: #6b7280; font-weight: 500; display: flex; align-items: center; gap: 12px; text-decoration: none; margin-bottom: 8px; }
    .menu-item.active { background: var(--primary-green); color: #fff; }

    .main-content { flex: 1; padding: 40px; }
    .card { background: #fff; border-radius: 20px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid var(--border-light); }
    
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border-light); }
    th { color: #6b7280; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
    
    .badge { padding: 6px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }
    .badge-success { background: #d1fae5; color: #059669; }
    .badge-warning { background: #fffbeb; color: #b45309; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo" style="font-weight: 800; font-size: 1.5rem; color: var(--primary-green); margin-bottom: 40px;">Merenda Check</div>
    <nav>
      <a href="gestor.html" class="menu-item"><i class="fa-solid fa-house"></i> Dashboard</a>
      <a href="#" class="menu-item active"><i class="fa-solid fa-boxes-stacked"></i> Estoque Local</a>
      <a href="config-algoritmo.html" class="menu-item"><i class="fa-solid fa-gear"></i> Configurações</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="card">
      <h2>Inventário da Unidade Escolar</h2>
      <div style="margin-top: 10px; display: flex; gap: 10px;">
        <span class="badge badge-success">Disponível: 42 itens</span>
        <span class="badge badge-warning">Crítico: 2 itens</span>
      </div>

      <table>
        <thead>
          <tr>
            <th>Produto</th>
            <th>Lote</th>
            <th>Quantidade</th>
            <th>Vencimento</th>
            <th>Status FIFO</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>Feijão Carioca</strong></td>
            <td>#8821</td>
            <td>45 kg</td>
            <td>15/09/2026</td>
            <td><span class="badge badge-success">LIBERADO</span></td>
          </tr>
          <tr>
            <td><strong>Leite Integral</strong></td>
            <td>#4920</td>
            <td>12 L</td>
            <td style="color: #ef4444; font-weight: 700;">20/03/2026</td>
            <td><span class="badge badge-warning">PRIORIDADE</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
