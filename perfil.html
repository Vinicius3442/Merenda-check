<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minhas Configurações | Merenda Check</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/global.css" />

  <style>
    /* For this demo, no sidebar logic to allow universal access, just an isolated view. */
    .profile-nav { position: fixed; width: 100%; top: 0; padding: 20px 40px; background: rgba(var(--bg-surface-rgb), 0.8); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border-subtle);}
    .profile-wrap { max-width: 800px; margin: 120px auto 40px; }

    .header-dash { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 20px;}
    .header-dash h1 { font-size: 2.2rem; margin-bottom: 8px; }

    .profile-card { padding: 40px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
    .big-avatar { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; font-size: 3rem; color: #fff; font-weight: 800; border: 4px solid var(--bg-surface); box-shadow: var(--neon-glow);}
    
    .theme-switch-container {
      display: flex; justify-content: center; gap: 20px; margin-top: 30px;
    }
    
    .theme-opt {
      width: 150px; padding: 20px; border: 2px solid var(--border-subtle); border-radius: 16px; cursor: pointer; transition: 0.3s;
      background: var(--bg-surface); color: var(--text-muted); font-weight: 600;
    }
    .theme-opt.active { border-color: var(--primary); color: var(--primary); background: rgba(5, 150, 105, 0.05); }
    .theme-opt i { font-size: 2rem; margin-bottom: 10px; display: block;}
    
  </style>
</head>
<body>

  <div class="bg-mesh"></div>

  <div class="profile-nav" style="display: flex; justify-content: space-between; align-items: center;">
     <button class="btn btn-secondary" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i> Retornar ao Console Anterior</button>
     <img src="assets/logo.png" alt="Merenda Check" class="logo-img" />
  </div>

  <div class="profile-wrap">
     <div class="header-dash animate-fade-in">
        <div>
          <h1>Configurações do Oráculo</h1>
          <p style="color: var(--text-muted); font-size: 1.1rem;">Ajuste suas preferências visuais e biométricas.</p>
        </div>
      </div>

      <div class="profile-card glass-panel animate-slide-up">
         <div class="big-avatar">M</div>
         <h2 class="brand-font" style="margin-bottom: 5px;">Mestre / Operador Padrão</h2>
         <p style="color: var(--text-muted); margin-bottom: 30px;">ID do Token: 0x9321AABCDC99</p>

         <div style="border-top: 1px dashed var(--border-subtle); padding-top: 30px;">
           <h3 class="brand-font" style="font-size: 1.2rem; margin-bottom: 10px;">Motor de Tema Universal</h3>
           <p style="color: var(--text-muted); font-size: 0.9rem;">Força a preferência de iluminação em todas as telas da criptografia simulada.</p>
           
           <div class="theme-switch-container">
              <div class="theme-opt" id="optLight" onclick="forceThemeLocal('light')">
                <i class="fa-solid fa-sun"></i> Modo Luz
              </div>
              <div class="theme-opt" id="optDark" onclick="forceThemeLocal('dark')">
                <i class="fa-solid fa-moon"></i> Cyber Escuro
              </div>
           </div>
         </div>
         
         <div style="margin-top: 50px;">
           <button class="btn btn-primary" style="padding: 16px 32px;" onclick="history.back()"><i class="fa-solid fa-floppy-disk"></i> Gravar & Retornar</button>
         </div>
      </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('theme') || 'dark';
      updateSelection(saved);
    });

    function forceThemeLocal(theme) {
      // Reuse logic from main.js implicitly
      const html = document.documentElement;
      html.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      
      App.updateThemeIcon(theme);
      window.dispatchEvent(new CustomEvent('themeChanged', { detail: { theme: theme } }));
      
      updateSelection(theme);
      App.showToast('Configuração Aplicada', `Renderizador alterado com sucesso.`, 'success');
    }

    function updateSelection(theme) {
      document.getElementById('optLight').classList.remove('active');
      document.getElementById('optDark').classList.remove('active');
      
      if(theme === 'dark') {
        document.getElementById('optDark').classList.add('active');
      } else {
        document.getElementById('optLight').classList.add('active');
      }
    }
  </script>
</body>
</html>
