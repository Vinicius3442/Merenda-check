<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrar Refeição | Merenda Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root {
      --primary: #059669; --primary-dark: #047857;
      --bg-base: #ffffff; --bg-surface: #f8fafc;
      --text-main: #0f172a; --text-muted: #64748b;
      --glass-border: rgba(0, 0, 0, 0.1);
      --glass-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --neon-glow: 0 4px 12px rgba(5, 150, 105, 0.2);
      --alert-red: #ef4444; --alert-red-glow: 0 4px 12px rgba(239, 68, 68, 0.3);
      --alert-yellow: #f59e0b;
      --input-bg: rgba(0, 0, 0, 0.05);
      --card-bg: #ffffff;
    }
    [data-theme="dark"] {
      --primary: #00f260; --primary-dark: #0575e6;
      --bg-base: #030712; --bg-surface: rgba(17, 24, 39, 0.7);
      --text-main: #f9fafb; --text-muted: #9ca3af;
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --neon-glow: 0 0 20px rgba(0, 242, 96, 0.4);
      --alert-red: #ef4444; --alert-red-glow: 0 0 20px rgba(239, 68, 68, 0.4);
      --alert-yellow: #facc15;
      --input-bg: rgba(0, 0, 0, 0.5);
      --card-bg: rgba(255, 255, 255, 0.03);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Outfit", sans-serif; background: var(--bg-base); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
    
    /* Background Grid */
    .bg-grid {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2;
      background-image: 
        linear-gradient(var(--glass-border) 1px, transparent 1px),
        linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .bg-glow {
      position: fixed; top: -20%; right: -10%; width: 60vw; height: 60vw; border-radius: 50%;
      background: radial-gradient(circle, rgba(5, 117, 230, 0.1) 0%, transparent 60%); z-index: -1;
    }

    /* Mobile / Tablet App Structure */
    .app-header {
      background: var(--bg-surface); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--glass-border); padding: 15px 24px;
      display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;
      box-shadow: var(--glass-shadow);
    }
    .back-btn { display: flex; align-items: center; gap: 8px; color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 1.1rem; }
    .back-btn i { color: var(--primary); }

    .main-content {
      flex: 1; padding: 30px 24px 100px; max-width: 600px; margin: 0 auto; width: 100%;
    }
    
    .page-title { text-align: center; margin-bottom: 30px; }
    .page-title h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
    .page-title p { color: var(--text-muted); font-size: 1rem; }

    /* Live Scanner UI */
    .camera-frame {
      background: var(--text-main); border: 4px solid var(--glass-border); border-radius: 30px;
      overflow: hidden; position: relative; height: 350px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); cursor: pointer; transition: 0.3s;
    }
    .camera-frame.scanning { border-color: var(--primary); box-shadow: var(--neon-glow); }
    
    /* Simulate camera feed block (dark gray abstract shape to imply blurred feed) */
    .cam-feed { position: absolute; top:0; left: 0; width: 100%; height: 100%; background: var(--bg-surface); opacity: 0.8; }
    
    .scanner-target {
      width: 70%; height: 60%; border: 3px solid rgba(255,255,255,0.3); border-radius: 20px;
      position: relative; display: flex; align-items: center; justify-content: center; z-index: 2;
    }
    /* scanner target corners */
    .scanner-target::before, .scanner-target::after {
      content: ''; position: absolute; width: 30px; height: 30px; border-color: var(--primary); border-style: solid;
    }
    .scanner-target::before { top: -3px; left: -3px; border-width: 4px 0 0 4px; border-top-left-radius: 20px; }
    .scanner-target::after { bottom: -3px; right: -3px; border-width: 0 4px 4px 0; border-bottom-right-radius: 20px; }
    
    .scan-line {
      position: absolute; top: 10px; left: 5%; width: 90%; height: 4px; background: var(--primary);
      border-radius: 4px; box-shadow: var(--neon-glow); z-index: 3; display: none;
    }
    @keyframes scanMove { 0% { top: 10%; } 100% { top: 90%; } }
    
    .camera-overlay-text {
      position: absolute; bottom: 30px; color: #fff; z-index: 4; font-weight: 600; font-size: 1.1rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8); background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 50px;
    }

    /* Student Matched Card (Hidden initially) */
    .student-card {
      background: var(--bg-surface); border: 1px solid var(--primary); border-radius: 20px;
      padding: 24px; box-shadow: var(--neon-glow); backdrop-filter: blur(20px);
      display: none; align-items: center; gap: 20px; margin-bottom: 24px; animation: slideUp 0.4s ease-out;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .student-avatar {
      width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800;
    }
    .student-info h3 { font-size: 1.3rem; margin-bottom: 4px; color: var(--text-main); }
    .student-info p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px; }
    
    .tag { display: inline-block; background: rgba(0,242,96,0.1); color: var(--primary); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; border: 1px solid rgba(0,242,96,0.2); }
    .tag.diet { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.2); }

    .manual-entry {
      text-align: center; color: var(--text-muted); cursor: pointer; text-decoration: underline; font-weight: 500;
      margin-top: 20px; transition: 0.2s;
    }
    .manual-entry:hover { color: var(--primary); }


    /* Desktop Responsiveness */
    @media (min-width: 900px) {
      .main-content { padding: 60px 40px; max-width: 800px; }
      .app-header { padding: 20px 50px; }
      
      .form-box, .scanner-box, .camera-frame { padding: 50px; border-radius: 30px; }
      .camera-frame { height: 500px; }
      
      .type-grid { gap: 30px; }
      .type-btn { padding: 24px; font-size: 1.2rem; }
      .type-btn i { font-size: 2.5rem; }
      
      .btn-submit { padding: 20px; font-size: 1.2rem; }
    }
  </style>

  <script>
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <header class="app-header">
    <a href="operador.html" class="back-btn">
      <i class="fa-solid fa-chevron-left"></i> Voltar
    </a>
    <span style="font-weight: 700; color: var(--text-muted);">Refeitório</span>
  </header>

  <main class="main-content">
    <div class="page-title">
      <h1>Registrar Refeição</h1>
      <p>Aponte a câmera para o crachá ou carteirinha digital do aluno.</p>
    </div>

    <!-- Scanner Feed -->
    <div class="camera-frame" id="camera" onclick="simularLeituraqr()">
      <div class="cam-feed"></div>
      
      <div class="scanner-target" id="scanner-target">
        <i class="fa-solid fa-qrcode" id="qr-icon" style="font-size: 4rem; color: rgba(255,255,255,0.4);"></i>
      </div>
      <div class="scan-line" id="scan-line"></div>
      
      <div class="camera-overlay-text" id="status-text">Toque para Simular Scanner</div>
    </div>

    <!-- Student Recognized Card -->
    <div class="student-card" id="student-card">
      <div class="student-avatar">LG</div>
      <div class="student-info">
        <h3>Lucas Gabriel Souza</h3>
        <p>Matrícula: 20268499 • Turma: 8º Ano B</p>
        <div style="display: flex; gap: 8px;">
          <span class="tag"><i class="fa-solid fa-check"></i> Refeição Aprovada</span>
          <span class="tag diet"><i class="fa-solid fa-triangle-exclamation"></i> Alérgico a Amendoim</span>
        </div>
      </div>
    </div>

    <div class="manual-entry" onclick="matriculaManual()">
      Ou digite a matrícula manualmente
    </div>

  </main>

  <script>
    let scanning = false;

    function simularLeituraqr() {
      if (scanning) return;
      scanning = true;

      const cam = document.getElementById('camera');
      const scanLine = document.getElementById('scan-line');
      const statusText = document.getElementById('status-text');
      const studentCard = document.getElementById('student-card');
      const qrIcon = document.getElementById('qr-icon');

      studentCard.style.display = 'none';
      
      // Start Animation
      cam.classList.add('scanning');
      scanLine.style.display = 'block';
      scanLine.style.animation = 'scanMove 1.5s infinite alternate ease-in-out';
      statusText.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processando ID...';
      qrIcon.style.color = 'var(--primary)';

      // Auto resolve after 2.5 seconds
      setTimeout(() => {
        cam.classList.remove('scanning');
        scanLine.style.animation = 'none';
        scanLine.style.display = 'none';
        qrIcon.style.color = 'rgba(255,255,255,0.4)';

        statusText.innerHTML = '<i class="fa-solid fa-check" style="color:#00f260"></i> Identificação Criptográfica de Lucas Validada!';
        
        studentCard.style.display = 'flex';
        
        // Reset state after 4 seconds of success to scan the next one
        setTimeout(() => {
          studentCard.style.display = 'none';
          statusText.innerHTML = 'Toque para Simular Scanner do próximo Aluno';
          scanning = false;
        }, 4000);
      }, 2500);
    }

    function matriculaManual() {
      const resp = prompt('Digite a matrícula do Aluno: (Ex: 20268499)');
      if(resp) {
        simularLeituraqr();
      }
    }
  </script>

  <button class="theme-toggle" onclick="toggleTheme()" style="position: fixed; bottom: 30px; right: 30px; z-index: 9999; background: var(--bg-surface); border: 1px solid var(--glass-border); color: var(--text-main); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--glass-shadow); transition: 0.3s; font-size: 1.2rem;">
    <i class="fa-solid fa-moon"></i>
  </button>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      const icon = document.querySelector('.theme-toggle i');
      if(icon) icon.className = isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }
    window.addEventListener('DOMContentLoaded', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const icon = document.querySelector('.theme-toggle i');
      if(icon) icon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    });
  </script>
</body>

</html>
