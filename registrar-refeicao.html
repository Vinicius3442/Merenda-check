<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Refeição | Merenda Check</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/global.css" />

  <style>
    .header-dash { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 20px;}
    .header-dash h1 { font-size: 2.2rem; margin-bottom: 8px; }

    .wizard-container { max-width: 700px; margin: 0 auto; }
    
    .large-input {
      font-size: 3rem; text-align: center; font-weight: 800; padding: 20px; font-family: 'Outfit';
      background: var(--input-bg); border: 2px dashed var(--input-border);
    }
    .large-input:focus { border-style: solid; box-shadow: 0 0 0 5px rgba(5, 150, 105, 0.1); }
  </style>
</head>
<body>

  <div class="bg-mesh"></div>

  <div class="app-container">
    <main class="app-main" style="padding-top: 60px;">
      
      <div class="wizard-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
          <a href="operador.html" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
          <img src="assets/logo.png" alt="Merenda Check" class="logo-img" />
        </div>
        
        <div class="header-dash animate-fade-in">
          <div>
            <h1>Apontamento Manual</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Utilize este recurso em caso de falha da roleta biométrica do refeitório.</p>
          </div>
        </div>

        <div class="glass-panel animate-slide-up" style="padding: 40px;">
          
          <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 80px; height: 80px; background: rgba(5, 150, 105, 0.1); color: var(--primary); font-size: 2.5rem; display: inline-flex; justify-content: center; align-items: center; border-radius: 50%; margin-bottom: 16px;">
              <i class="fa-solid fa-users"></i>
            </div>
            <h3 class="brand-font" style="font-size: 1.4rem;">Quantidade Estimada Servida</h3>
          </div>

          <div class="form-group" style="margin-bottom: 40px;">
            <input type="number" class="form-control large-input" placeholder="000" id="fQtd" />
          </div>

          <div class="form-group">
            <label class="form-label">Nome do Supervisor / Responsável Legal</label>
            <input type="text" class="form-control" value="João Maria (123.456.789-00)" readonly />
          </div>

          <div style="margin-top: 40px;">
            <button class="btn btn-primary" style="width: 100%; padding: 18px; font-size: 1.1rem;" data-action="mock-submit" data-redirect="operador.html" data-success-title="Sistema Sincronizado" data-success-msg="Base de dados do refeitório atualizada com sucesso.">
              <i class="fa-solid fa-cloud-arrow-up"></i> Confirmar Quantidade
            </button>
          </div>
          
        </div>

      </div>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
