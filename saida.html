<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movimentação de Saída | Merenda Check</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/global.css" />

  <style>
    .header-dash { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 20px;}
    .header-dash h1 { font-size: 2.2rem; margin-bottom: 8px; }

    .wizard-container { max-width: 900px; margin: 0 auto; }
    
    .invoice-card { padding: 40px; position: relative; }
    .invoice-card::before {
      content: ''; position: absolute; left: 0; top: 0; width: 6px; height: 100%; background: var(--alert-blue);
      border-radius: 20px 0 0 20px;
    }
    
    .scanner-mock {
      width: 100%; height: 150px; border-radius: 16px; border: 2px dashed var(--alert-blue);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(59, 130, 246, 0.05); color: var(--alert-blue); margin-bottom: 30px; cursor: pointer; transition: 0.3s;
    }
    .scanner-mock:hover { background: rgba(59, 130, 246, 0.1); }
  </style>
</head>
<body>

  <div class="bg-mesh"></div>

  <div class="app-container">
    <main class="app-main" style="padding-top: 60px;">
      
      <div class="wizard-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
          <a href="operador.html" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
          <img src="assets/logo.png" alt="Merenda Check" class="logo-img" />
        </div>
        
        <div class="header-dash animate-fade-in">
          <div>
            <h1>Transferência Externa / Remanejamento</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Comunique a saída física de mercadorias para o Pátio Central ou outra Unidade.</p>
          </div>
        </div>

        <div class="glass-panel invoice-card animate-slide-up">
          
          <div class="scanner-mock" id="scannerMock">
            <i class="fa-solid fa-barcode" style="font-size: 3rem; margin-bottom: 10px;"></i>
            <h3 class="brand-font" style="font-size: 1.1rem;">Escaneie o Recibo da Transportadora</h3>
          </div>

          <div class="form-group">
            <label class="form-label">Motivo de Remanejamento</label>
            <select class="form-control" id="fMotivo">
              <option disabled>Selecione um evento contratual...</option>
              <option selected>Transferência entre Escolas (Equilíbrio Inteligente IA)</option>
              <option>Devolução Fornecedor (Defeito Organoléptico)</option>
              <option>Recolhimento Secretaria Sede</option>
            </select>
          </div>
          
          <div class="form-group" style="margin-bottom: 30px;">
            <label class="form-label">Destinatário</label>
            <input type="text" class="form-control" placeholder="CNPJ/ID do Órgão de Destino" id="fDestino" value="EMEF Castro Alves (Id: 1049)" />
          </div>

          <div class="table-wrapper">
             <table class="data-table">
               <thead>
                 <th>Insumo Autuado</th>
                 <th>Hash (Blockchain)</th>
                 <th>Volume Solicitado</th>
               </thead>
               <tbody>
                 <tr>
                   <td>Carne Moída Bovina</td>
                   <td style="font-family: monospace;">#4920-A</td>
                   <td>5 kg</td>
                 </tr>
               </tbody>
             </table>
          </div>

          <div style="margin-top: 40px; text-align: right;">
            <button class="btn btn-primary" id="btnConfirmar" data-action="mock-submit" data-redirect="operador.html" data-success-title="Manifesto Gerado" data-success-msg="A guia de remessa eletrônica foi despachada para o motorista.">
              <i class="fa-solid fa-truck-fast"></i> Validar Saída (Guia GNRE)
            </button>
          </div>
          
        </div>

      </div>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
