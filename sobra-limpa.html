<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sobra Limpa (Panela) | Merenda Check</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/global.css" />

  <style>
    .header-dash { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 20px;}
    .header-dash h1 { font-size: 2.2rem; margin-bottom: 8px; }

    .wizard-container { max-width: 700px; margin: 0 auto; }
    
    .large-input-group { position: relative; display: flex; align-items: center; }
    .large-input {
      font-size: 3rem; text-align: right; font-weight: 800; padding: 20px 80px 20px 20px; font-family: 'Outfit';
      background: var(--input-bg); border: 2px dashed var(--input-border); flex: 1;
    }
    .large-input:focus { border-style: solid; box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.1); border-color: var(--alert-red); outline: none; }
    
    .unit-label {
      position: absolute; right: 20px; font-size: 1.5rem; font-weight: 800; color: var(--text-muted); font-family: 'Outfit'; pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="bg-mesh"></div>

  <div class="app-container">
    <main class="app-main" style="padding-top: 60px;">
      
      <div class="wizard-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
          <a href="operador.html" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
          <img src="assets/logo.png" alt="Merenda Check" class="logo-img" />
        </div>
        
        <div class="header-dash animate-fade-in">
          <div>
            <h1>Registro de Sobra Limpa</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Preencha o peso da sobra das panelas (alimento pronto não servido).</p>
          </div>
        </div>

        <div class="glass-panel animate-slide-up" style="padding: 40px; border-top: 4px solid var(--alert-red);">
          
          <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 80px; height: 80px; background: rgba(239, 68, 68, 0.1); color: var(--alert-red); font-size: 2.5rem; display: inline-flex; justify-content: center; align-items: center; border-radius: 50%; margin-bottom: 16px;">
              <i class="fa-solid fa-scale-unbalanced"></i>
            </div>
            <h3 class="brand-font" style="font-size: 1.4rem;">Peso Aferido na Balança</h3>
          </div>

          <div class="form-group" style="margin-bottom: 40px;">
            <div class="large-input-group">
              <input type="number" step="0.1" class="form-control large-input" placeholder="0.0" id="fPeso" />
              <span class="unit-label">kg</span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Motivo do Desperdício</label>
            <select class="form-control">
              <option value="super">Estimativa Incorreta de Alunos Presentes</option>
              <option value="sabor">Rejeição por Sabor ou Aparência</option>
              <option value="validade">Alimento Preparado Inadequadamente</option>
            </select>
          </div>

          <div style="margin-top: 40px;">
            <button class="btn btn-primary btn-lg" style="width: 100%; background: var(--alert-red); box-shadow: var(--alert-red-glow);" data-action="mock-submit" data-redirect="operador.html" data-success-title="Desperdício Registrado" data-success-msg="A secretaria foi notificada para ajustar o planejamento contínuo.">
              <i class="fa-solid fa-triangle-exclamation"></i> Concluir Registro
            </button>
          </div>
          
        </div>

      </div>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
