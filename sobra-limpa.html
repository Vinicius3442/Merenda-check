<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sobra Limpa (Panela) | Merenda Check</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  

  <style>
    .header-dash { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 20px;}
    .header-dash h1 { font-size: 2.2rem; margin-bottom: 8px; }

    .wizard-container { max-width: 700px; margin: 0 auto; }
    
    .large-input-group { position: relative; display: flex; align-items: center; }
    .large-input {
      font-size: 3rem; text-align: right; font-weight: 800; padding: 20px 80px 20px 20px; font-family: 'Outfit';
      background: var(--input-bg); border: 2px dashed var(--input-border); flex: 1;
    }
    .large-input:focus { border-style: solid; box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.1); border-color: var(--alert-red); outline: none; }
    
    .unit-label {
      position: absolute; right: 20px; font-size: 1.5rem; font-weight: 800; color: var(--text-muted); font-family: 'Outfit'; pointer-events: none;
    }
  </style>

<style>
/* --- INJECTED GLOBAL CSS FOR FIGMA --- */
:root {
   --primary: #25d371;
  --primary-dark: #0ca650;
  --primary-light: #60f59e;
  
  --accent: #3ae285;
  --accent-light: #8bfebc;
  
  /* Backgrounds */
  --bg-base: #0f172a; /* Rich dark blue */
  --bg-surface: #1e293b;
  --bg-surface-elevated: #334155;
  
  /* Text */
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --text-inverse: #0f172a;
  
  /* Borders & Effects */
  --border-subtle: #475569;
  --glass-border: rgba(255, 255, 255, 0.05);
  --glass-bg: rgba(30, 41, 59, 0.85);
  --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
  --shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.5);
  --neon-glow: 0 0 20px rgba(37, 211, 113, 0.4);
  
  /* Status Colors */
  --alert-red: #f43f5e;
  --alert-red-glow: 0 0 20px rgba(244, 63, 94, 0.3);
  --alert-yellow: #fbbf24;
  --alert-yellow-glow: 0 0 20px rgba(251, 191, 36, 0.2);
  --alert-green: #34d399;
  --alert-blue: #60a5fa;

  /* Forms */
  --input-bg: rgba(15, 23, 42, 0.6);
  --input-border: rgba(255, 255, 255, 0.15);
}


* {
  margin: 0; padding: 0; box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background-color: var(--bg-base);
  color: var(--text-main);
  line-height: 1.7;
  overflow-x: hidden;
  transition: background-color var(--transition-smooth), color var(--transition-smooth);
}

h1, h2, h3, h4, h5, h6, .brand-font {
  font-weight: 700;
  letter-spacing: -0.01em;
}

/* Base Animations */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

.animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
.animate-slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.delay-100 { animation-delay: 100ms; }
.delay-200 { animation-delay: 200ms; }
.delay-300 { animation-delay: 300ms; }

/* Global Utilities */
.text-gradient {
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline-block;
}

.text-gradient-blue {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline-block;
}

.logo-img {
  height: 40px; /* Scaled up */
  width: auto;
  object-fit: contain;
}

.glass-panel {
  background: var(--glass-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
  border-radius: 24px; /* Larger radius */
  transition: var(--transition-smooth);
}
.glass-panel:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-4px);
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 12px 24px;
  border-radius: 12px;
  font-family: inherit;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all var(--transition-fast);
  text-decoration: none;
  border: 1px solid transparent;
  outline: none;
}

.btn-lg {
  padding: 18px 36px;
  font-size: 1.15rem;
  border-radius: 14px;
}

.btn-light {
  background: var(--bg-surface);
  color: var(--text-main);
  border: 1px solid var(--border-subtle);
  box-shadow: var(--glass-shadow);
}
.btn-light:hover {
  background: var(--bg-surface-elevated);
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  color: #ffffff;
  border: none;
  box-shadow: 0 4px 15px rgba(12, 166, 80, 0.3);
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: var(--neon-glow);
  color: #ffffff;
}

.btn-secondary {
  background: var(--bg-surface);
  color: var(--primary);
  border: 1px solid var(--border-subtle);
  box-shadow: var(--glass-shadow);
}

.btn-secondary:hover {
  box-shadow: var(--shadow-hover);
  border-color: var(--primary-light);
  transform: translateY(-3px);
  color: var(--primary-dark);
}

.btn-danger {
  background: rgba(225, 29, 72, 0.1);
  color: var(--alert-red);
  border: 1px solid rgba(225, 29, 72, 0.2);
}

.btn-danger:hover {
  background: var(--alert-red);
  color: #ffffff;
  box-shadow: var(--alert-red-glow);
  transform: translateY(-2px);
}

/* Forms */
.form-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px; /* More spacing */
}

.form-label {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-muted);
}

.form-control {
  padding: 16px 20px;
  border-radius: 16px;
  border: 2px solid var(--input-border);
  background: var(--input-bg);
  color: var(--text-main);
  font-family: inherit;
  font-size: 1.05rem;
  transition: all var(--transition-fast);
}

.form-control:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(12, 166, 80, 0.1);
  background: var(--bg-surface);
}

/* Badges */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.badge-success { background: rgba(16, 185, 129, 0.1); color: var(--alert-green); border: 1px solid rgba(16, 185, 129, 0.2); }
.badge-warning { background: rgba(245, 158, 11, 0.1); color: var(--alert-yellow); border: 1px solid rgba(245, 158, 11, 0.2); }
.badge-danger { background: rgba(225, 29, 72, 0.1); color: var(--alert-red); border: 1px solid rgba(225, 29, 72, 0.2); }
.badge-neutral { background: var(--bg-surface); color: var(--text-muted); border: 1px solid var(--border-subtle); }

/* Table System */
.table-wrapper {
  overflow-x: auto;
  border-radius: 20px;
  border: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  box-shadow: var(--glass-shadow);
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  text-align: left;
}

.data-table th {
  padding: 20px 24px;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 2px solid var(--border-subtle);
  background: var(--bg-surface-elevated);
  white-space: nowrap;
}

.data-table td {
  padding: 20px 24px;
  font-size: 1rem;
  color: var(--text-main);
  border-bottom: 1px solid var(--border-subtle);
  vertical-align: middle;
}

.data-table tbody tr {
  transition: background-color var(--transition-fast);
}

.data-table tbody tr:hover {
  background-color: var(--bg-base);
}

.data-table tbody tr:last-child td {
  border-bottom: none;
}

/* Toast System */
.toast-container {
  position: fixed;
  bottom: 40px;
  right: 40px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 20px;
  pointer-events: none;
}

.toast {
  background: var(--bg-surface);
  border: 1px solid var(--glass-border);
  border-left: 6px solid var(--accent);
  box-shadow: var(--shadow-hover);
  border-radius: 16px;
  padding: 20px 24px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  width: 360px;
  backdrop-filter: blur(14px);
  transform: translateX(120%);
  opacity: 0;
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  pointer-events: auto;
}

.toast.show {
  transform: translateX(0);
  opacity: 1;
}

.toast-icon {
  font-size: 1.8rem;
  color: var(--accent);
  flex-shrink: 0;
}

.toast.toast-error { border-left-color: var(--alert-red); }
.toast.toast-error .toast-icon { color: var(--alert-red); }
.toast.toast-warning { border-left-color: var(--alert-yellow); }
.toast.toast-warning .toast-icon { color: var(--alert-yellow); }

.toast-content h4 { margin: 0 0 6px 0; font-size: 1.1rem; color: var(--text-main); font-weight: 700; }
.toast-content p { margin: 0; font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; }


/* Base Layout wrappers */
.app-container {
  display: flex;
  min-height: 100vh;
}

.app-sidebar {
  width: 320px;
  flex-shrink: 0;
  background: var(--bg-surface);
  border-right: 1px solid var(--glass-border);
  display: flex;
  flex-direction: column;
  padding: 40px 30px;
  position: sticky;
  top: 0;
  height: 100vh;
  z-index: 100;
  box-shadow: var(--glass-shadow);
}

.app-main {
  flex: 1;
  padding: 60px;
  max-width: 1600px;
  margin: 0 auto;
}

/* Artistic / Abstract Background elements */
.bg-mesh {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: -1;
  background: var(--bg-base);
  pointer-events: none;
}
.bg-mesh::after {
  content: '';
  position: absolute;
  top: -20%; left: -10%;
  width: 80vw; height: 80vw;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(12, 166, 80, 0.05) 0%, transparent 70%);
}
.bg-mesh::before {
  content: '';
  position: absolute;
  bottom: -20%; right: -10%;
  width: 60vw; height: 60vw;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(37, 211, 113, 0.05) 0%, transparent 70%);
}

[data-theme="dark"] .bg-mesh::after {
  background: radial-gradient(circle, rgba(12, 166, 80, 0.15) 0%, transparent 70%);
}
[data-theme="dark"] .bg-mesh::before {
  background: radial-gradient(circle, rgba(37, 211, 113, 0.1) 0%, transparent 70%);
}


</style>
</head>
<body>

  <div class="bg-mesh"></div>

  <div class="app-container">
    <main class="app-main" style="padding-top: 60px;">
      
      <div class="wizard-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
          <a href="operador.html" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
          <img src="assets/logo.png" alt="Merenda Check" class="logo-img" />
        </div>
        
        <div class="header-dash animate-fade-in">
          <div>
            <h1>Registro de Sobra Limpa</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Preencha o peso da sobra das panelas (alimento pronto não servido).</p>
          </div>
        </div>

        <div class="glass-panel animate-slide-up" style="padding: 40px; border-top: 4px solid var(--alert-red);">
          
          <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 80px; height: 80px; background: rgba(239, 68, 68, 0.1); color: var(--alert-red); font-size: 2.5rem; display: inline-flex; justify-content: center; align-items: center; border-radius: 50%; margin-bottom: 16px;">
              <i class="fa-solid fa-scale-unbalanced"></i>
            </div>
            <h3 class="brand-font" style="font-size: 1.4rem;">Peso Aferido na Balança</h3>
          </div>

          <div class="form-group" style="margin-bottom: 40px;">
            <div class="large-input-group">
              <input type="number" step="0.1" class="form-control large-input" placeholder="0.0" id="fPeso" />
              <span class="unit-label">kg</span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Motivo do Desperdício</label>
            <select class="form-control">
              <option value="super">Estimativa Incorreta de Alunos Presentes</option>
              <option value="sabor">Rejeição por Sabor ou Aparência</option>
              <option value="validade">Alimento Preparado Inadequadamente</option>
            </select>
          </div>

          <div style="margin-top: 40px;">
            <button class="btn btn-primary btn-lg" style="width: 100%; background: var(--alert-red); box-shadow: var(--alert-red-glow);" data-action="mock-submit" data-redirect="operador.html" data-success-title="Desperdício Registrado" data-success-msg="A secretaria foi notificada para ajustar o planejamento contínuo.">
              <i class="fa-solid fa-triangle-exclamation"></i> Concluir Registro
            </button>
          </div>
          
        </div>

      </div>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
